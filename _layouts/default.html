<!doctype html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f5f0">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {%- include seo.html -%}

  {%- if page.title and page.title != site.title %}
  <title>{{ page.title }} — {{ site.title }}</title>
  {%- else %}
  <title>{{ site.title }} — {{ site.tagline }}</title>
  {%- endif %}
</head>
<body class="layout--{{ page.layout | default: 'default' }}">
  <a class="skip-link" href="#main">Saltar al contenido</a>
  {%- include header.html -%}
  <main id="main" class="site-main">
    {{ content }}
  </main>
  {%- include footer.html -%}
</body>
</html>
