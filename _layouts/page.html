---
layout: default
---

<article class="page">
  <header class="page__head wrap wrap--narrow">
    <p class="page__eyebrow">{{ page.eyebrow | default: 'Página' }}</p>
    <h1 class="page__title">{{ page.title }}</h1>
    {%- if page.subtitle %}
    <p class="page__subtitle">{{ page.subtitle }}</p>
    {%- endif %}
  </header>

  <div class="page__body wrap wrap--narrow">
    {{ content }}
  </div>
</article>
